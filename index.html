<script>
    async function loadTests() {
        const listContainer = document.getElementById('test-list');
        try {
            // ここで読み込むファイル名がGitHub上のものと一致しているか確認してください
            const fileName = './keikanwan_tests.json'; 
            
            const response = await fetch(fileName);
            
            if (!response.ok) {
                throw new Error(`ファイルが見つかりません: ${fileName}`);
            }

            const data = await response.json();
            
            if (data.length === 0) {
                listContainer.innerHTML = '<p>データが空です。</p>';
                return;
            }

            listContainer.innerHTML = ''; // ローディング表示をクリア
            data.forEach(test => {
                const card = document.createElement('div');
                card.className = 'test-card';
                card.innerHTML = `<h3>${test.name}</h3><p>${test.clinical_significance}</p>`;
                card.onclick = () => showDetail(test);
                listContainer.appendChild(card);
            });
        } catch (error) {
            console.error('Error:', error);
            listContainer.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: red;">
                データの読み込みに失敗しました。<br>
                原因: ${error.message}
            </p>`;
        }
    }

    function showDetail(test) {
        const modalBody = document.getElementById('modal-body');
        modalBody.innerHTML = `
            <div class="modal-header">
                <h2>${test.name}</h2>
            </div>
            <span class="section-title">【操作手順】</span>
            <ul>${test.procedure.map(step => `<li>${step}</li>`).join('')}</ul>
            <span class="section-title">【陽性所見】</span>
            <p>${test.positive_findings}</p>
            <span class="section-title">【意義】</span>
            <p>${test.clinical_significance}</p>
        `;
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
    }

    loadTests();
</script>
